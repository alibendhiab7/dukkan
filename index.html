<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05A17F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="دكّان" />
    <meta name="description" content="دكّان — نظام سحابي متكامل لإدارة نقاط البيع والمخازن" />
    <title>دكّان | Dukkan</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0B192C; }
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0B192C; transition: opacity 0.4s;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash img { width: 120px; height: auto; margin-bottom: 1.5rem; animation: pulse 1.5s ease-in-out infinite; }
      #splash p { color: #E0E0E0; font-family: system-ui, sans-serif; font-size: 0.9rem; font-weight: 600; }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/favicon.svg" alt="دكّان" />
      <p>جاري التحميل...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 500); }
        }, 800);
      });
    </script>
  </body>
</html>
